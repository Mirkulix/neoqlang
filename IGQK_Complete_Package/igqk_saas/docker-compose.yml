version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: igqk-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
      - DATABASE_URL=sqlite:///./igqk_saas.db
    volumes:
      - ./backend/compressed_models:/app/backend/compressed_models
      - ./backend/models_cache:/app/backend/models_cache
      - ./backend/datasets_cache:/app/backend/datasets_cache
      - ./backend/igqk_saas.db:/app/backend/igqk_saas.db
    networks:
      - igqk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend UI Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: igqk-frontend
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - PYTHONUNBUFFERED=1
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - API_BASE=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - igqk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: igqk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - igqk-network
    profiles:
      - production

networks:
  igqk-network:
    driver: bridge

volumes:
  models_data:
    driver: local
  database_data:
    driver: local

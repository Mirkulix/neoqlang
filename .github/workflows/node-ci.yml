name: Node CI (Theia & VSCode)

on:
  push:
    branches: [ main, master ]
    paths: [ "qlang/editors/**" ]
  pull_request:
    branches: [ main, master ]
    paths: [ "qlang/editors/**" ]

jobs:
  build-vscode:
    name: Build VSCode Extension
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: 'qlang/editors/vscode/package-lock.json'
    - name: Install dependencies
      working-directory: qlang/editors/vscode
      run: npm ci
    - name: Build
      working-directory: qlang/editors/vscode
      run: npm run compile

  build-theia:
    name: Build Theia Extension
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'yarn'
        cache-dependency-path: 'qlang/editors/theia/yarn.lock'
    - name: Install dependencies
      working-directory: qlang/editors/theia
      run: yarn install --frozen-lockfile
    - name: Build
      working-directory: qlang/editors/theia
      run: yarn build
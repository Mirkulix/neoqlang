version: "3.8"

services:
  qlang-api:
    build: .
    command: ["web", "--port", "8080"]
    ports:
      - "8080:8080"
    restart: always
    volumes:
      - qlang-models:/data/models
    environment:
      - QLANG_MODEL_DIR=/data/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qlang-models:

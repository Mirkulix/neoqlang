apiVersion: apps/v1
kind: Deployment
metadata:
  name: qlang-worker-qlang-training-compressor
  namespace: qlang-system
  labels:
    app: qlang
    job: qlang-training
    role: compressor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qlang
      job: qlang-training
      worker: compressor
  template:
    metadata:
      labels:
        app: qlang
        job: qlang-training
        worker: compressor
        role: compressor
    spec:
      serviceAccountName: qlang-worker
      containers:
        - name: qlang-node
          image: mirkulix/qlang:latest
          command: ["qlang-cli", "agent", "--role", "compressor", "--job", "qlang-training", "--id", "compressor"]
          ports:
            - containerPort: 9900
              name: tcp-qlms
          resources:
            requests:
            cpu: "2"
            memory: "4Gi"
          env:
            - name: QLANG_COORDINATOR_URL
              value: "tcp://qlang-job-qlang-training.qlang-system.svc.cluster.local:9900"